<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link
  rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
/>
  <title>声日記</title>

  <style>
    body {
      font-family: sans-serif;
      max-width: 640px;
      margin: 0 auto;
      padding: 24px;
      background: #f7f7f7;
      color: #222;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 16px;
    }

    h2 {
      font-size: 18px;
      margin: 18px 0 10px;
    }

    button {
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
    }

    .main-button {
      width: 100%;
      padding: 16px;
      margin-bottom: 16px;
      font-size: 18px;
      background: #333;
      color: white;
    }

    .main-button.listening {
      background: #7a3cff;
    }

    .diary-area,
    .past-diary-area {
      background: white;
      border-radius: 12px;
      overflow: hidden;
    }

    .diary-item {
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid #eee;
      background: white;
    }

    .swipe-content {
      position: relative;
      z-index: 2;
      background: white;
      padding: 12px;
      transition: transform 0.2s ease;
      display: flex;
      align-items: center;
    }

    .diary-item.show-delete .swipe-content {
      transform: translateX(-64px);
    }

    .text {
      line-height: 1.6;
      font-size: 14px;
      word-break: break-word;
    }

    .delete-button {
  position: absolute;
  top: 0;
  right: 0;
  width: 64px;
  height: 100%;
  background: #d33;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
}

.material-symbols-outlined {
  font-size: 24px;
}

    .past-section {
      margin-top: 24px;
    }

    .date-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .date-button {
      padding: 7px 11px;
      font-size: 13px;
      background: #d0d0d0;
      color: #222;
    }

    .date-button.active {
      background: #999;
      color: white;
    }

    .past-diary-area {
      display: none;
    }

    .past-diary-area.open {
      display: block;
    }

    .past-diary-item {
      padding: 10px 12px;
      border-bottom: 1px solid #eee;
      font-size: 13px;
      line-height: 1.5;
    }

.download-area {
  margin-top: 16px;
}

.diary-item.show-delete .swipe-content {
  transform: translateX(-64px);
}

.diary-item.show-edit .swipe-content {
  transform: translateX(64px);
}

.edit-button {
  position: absolute;
  top: 0;
  left: 0;
  width: 64px;
  height: 100%;
  background: #4c956c;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
}

.text.editing {
  width: 100%;
  padding: 6px;
  border: 1px solid #aaa;
  border-radius: 6px;
  background: #fffdf2;
  outline: none;
}

#monthSelect {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 16px;
  background: white;
}
  </style>
</head>

<body>

  <h1>声日記</h1>

  <button id="voiceButton" class="main-button">
    話して日記を書く
  </button>

  <h2>今日の日記</h2>

  <div id="todayDiaryList" class="diary-area"></div>

  <div class="past-section">
    <h2>過去の日記</h2>

    <div id="dateButtons" class="date-buttons"></div>

    <div id="pastDiaryList" class="past-diary-area"></div>
  </div>

 <div class="download-area">
  <select id="monthSelect"></select>
  <button id="downloadButton" class="main-button">
    txtファイルでダウンロード
  </button>
</div>

  <script>
    const STORAGE_KEY = "voiceDiaryData";

    const voiceButton = document.getElementById("voiceButton");
    const downloadButton = document.getElementById("downloadButton");
    const todayDiaryList = document.getElementById("todayDiaryList");
    const dateButtons = document.getElementById("dateButtons");
    const pastDiaryList = document.getElementById("pastDiaryList");
    const monthSelect = document.getElementById("monthSelect");

    let selectedPastDateKey = null;

    const today = new Date();
    const todayKey = formatDateKey(today);

    const SpeechRecognition =
      window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      voiceButton.textContent =
        "このブラウザは音声入力に未対応です";
      voiceButton.disabled = true;
    } else {

      const recognition = new SpeechRecognition();

      recognition.lang = "ja-JP";
      recognition.interimResults = false;
      recognition.continuous = false;

      voiceButton.addEventListener("click", () => {
        voiceButton.textContent = "聞いています...";
        voiceButton.classList.add("listening");

        recognition.start();
      });

      recognition.onresult = (event) => {
        const text = event.results[0][0].transcript;

        const items = formatDiary(text);

        items.forEach((item) => {
          saveDiaryItem(todayKey, item);
        });

        renderTodayDiary();
renderPastDateButtons();
renderMonthSelect();
      };

      recognition.onend = () => {
        voiceButton.textContent = "話して日記を書く";
        voiceButton.classList.remove("listening");
      };

      recognition.onerror = () => {
        voiceButton.textContent = "話して日記を書く";
        voiceButton.classList.remove("listening");

        alert("音声入力でエラーが発生しました。");
      };
    }

    downloadButton.addEventListener("click", downloadTxt);

    renderTodayDiary();
renderPastDateButtons();
renderMonthSelect();

    function formatDiary(text) {
      return text
        .split(/[。！？]/)
        .map((sentence) => sentence.trim())
        .filter((sentence) => sentence.length > 0);
    }

    function renderTodayDiary() {

      const data = getDiaryData();

      const items = data[todayKey] || [];

      todayDiaryList.innerHTML = "";

      items.forEach((text, index) => {
  addTodayDiaryItem(text, index);
});
    }

    function addTodayDiaryItem(text, index) {

  const item = document.createElement("div");
  item.className = "diary-item";

  const swipeContent = document.createElement("div");
  swipeContent.className = "swipe-content";

  const content = document.createElement("div");
  content.className = "text";
  content.textContent = text;

  swipeContent.appendChild(content);

  const editButton = document.createElement("div");
  editButton.className = "edit-button";
  editButton.innerHTML = `
    <span class="material-symbols-outlined">
      edit
    </span>
  `;

  const deleteButton = document.createElement("div");
  deleteButton.className = "delete-button";
  deleteButton.innerHTML = `
    <span class="material-symbols-outlined">
      delete
    </span>
  `;

  let isEditing = false;
  let startX = 0;
  let startState = "default";

  editButton.addEventListener("click", () => {
    if (!isEditing) {
      isEditing = true;
      content.contentEditable = "true";
      content.classList.add("editing");
      content.focus();
    } else {
      isEditing = false;
      content.contentEditable = "false";
      content.classList.remove("editing");

      updateDiaryItem(todayKey, index, content.textContent.trim());

      item.classList.remove("show-edit");
      renderTodayDiary();
      renderMonthSelect();
    }
  });

  deleteButton.addEventListener("click", () => {
    deleteDiaryItemByIndex(todayKey, index);
    renderTodayDiary();
    renderPastDateButtons();
    renderMonthSelect();
  });

  item.appendChild(editButton);
  item.appendChild(deleteButton);
  item.appendChild(swipeContent);

  todayDiaryList.appendChild(item);

  item.addEventListener("touchstart", (event) => {
    startX = event.touches[0].clientX;

    if (item.classList.contains("show-delete")) {
      startState = "delete";
    } else if (item.classList.contains("show-edit")) {
      startState = "edit";
    } else {
      startState = "default";
    }
  });

  item.addEventListener("touchmove", (event) => {
    const currentX = event.touches[0].clientX;
    const diff = startX - currentX;

    if (startState === "default") {
      if (diff > 40) {
        item.classList.add("show-delete");
        item.classList.remove("show-edit");
      }

      if (diff < -40) {
        item.classList.add("show-edit");
        item.classList.remove("show-delete");
      }
    } else if (startState === "delete") {
      if (diff < -30) {
        item.classList.remove("show-delete");
      }
    } else if (startState === "edit") {
      if (diff > 30) {
        item.classList.remove("show-edit");
      }
    }
  });

  document.addEventListener("touchstart", (event) => {
    const touchedInside = item.contains(event.target);

    if (!touchedInside) {
      item.classList.remove("show-delete");
      item.classList.remove("show-edit");
    }
  });
}

  deleteButton.addEventListener("click", () => {
    deleteDiaryItemByIndex(todayKey, index);
    renderTodayDiary();
    renderPastDateButtons();
    renderMonthSelect();
  });

  item.appendChild(editButton);
  item.appendChild(deleteButton);
  item.appendChild(swipeContent);

  todayDiaryList.appendChild(item);

  let startX = 0;
  let startState = "default";

item.addEventListener("touchstart", (event) => {

  startX = event.touches[0].clientX;

  if (item.classList.contains("show-delete")) {
    startState = "delete";
  } else if (item.classList.contains("show-edit")) {
    startState = "edit";
  } else {
    startState = "default";
  }
});

  item.addEventListener("touchmove", (event) => {

  const currentX = event.touches[0].clientX;

  const diff = startX - currentX;

  // 通常状態
  if (startState === "default") {

    // 左スワイプ → 削除
    if (diff > 40) {
      item.classList.add("show-delete");
      item.classList.remove("show-edit");
    }

    // 右スワイプ → 編集
    if (diff < -40) {
      item.classList.add("show-edit");
      item.classList.remove("show-delete");
    }
  }

  // 削除表示中
  else if (startState === "delete") {

    // 右へ戻す → 通常
    if (diff < -30) {
      item.classList.remove("show-delete");
    }
  }

  // 編集表示中
  else if (startState === "edit") {

    // 左へ戻す → 通常
    if (diff > 30) {
      item.classList.remove("show-edit");
    }
  }
});

    function renderPastDateButtons() {
  const data = getDiaryData();

  dateButtons.innerHTML = "";

  const pastKeys = Object.keys(data)
    .sort()
    .reverse()
    .filter((dateKey) => dateKey !== todayKey)
    .slice(0, 20);

  pastKeys.forEach((dateKey) => {
    const date = new Date(dateKey);

    const button = document.createElement("button");
    button.className = "date-button";
    button.textContent = `${date.getMonth() + 1}/${date.getDate()}`;

    if (selectedPastDateKey === dateKey) {
      button.classList.add("active");
    }

    button.addEventListener("click", () => {
      if (selectedPastDateKey === dateKey) {
        selectedPastDateKey = null;
        pastDiaryList.classList.remove("open");
        pastDiaryList.innerHTML = "";
      } else {
        selectedPastDateKey = dateKey;
        renderPastDiary(dateKey);
      }

      renderPastDateButtons();
    });

    dateButtons.appendChild(button);
  });
}

    function renderPastDiary(dateKey) {

      const data = getDiaryData();

      const items = data[dateKey] || [];

      pastDiaryList.innerHTML = "";

      pastDiaryList.classList.add("open");

      items.forEach((text) => {

        const item = document.createElement("div");

        item.className = "past-diary-item";

        item.textContent = `・${text}`;

        pastDiaryList.appendChild(item);
      });
    }

    function getDiaryData() {

      return JSON.parse(
        localStorage.getItem(STORAGE_KEY)
      ) || {};
    }

    function setDiaryData(data) {

      localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(data)
      );
    }

    function saveDiaryItem(dateKey, text) {

      const data = getDiaryData();

      if (!data[dateKey]) {
        data[dateKey] = [];
      }

      data[dateKey].push(text);

      setDiaryData(data);
    }

    function deleteDiaryItem(dateKey, text) {

      const data = getDiaryData();

      if (!data[dateKey]) return;

      data[dateKey] =
        data[dateKey].filter((item) => item !== text);

      if (data[dateKey].length === 0) {
        delete data[dateKey];
      }

      setDiaryData(data);
    }

    function downloadTxt() {
  const data = getDiaryData();

  const selectedMonth = monthSelect.value;

  if (!selectedMonth) {
    alert("ダウンロードする月の日記がありません。");
    return;
  }

  const [yearText, monthText] = selectedMonth.split("/");
  const year = Number(yearText);
  const month = Number(monthText);

  const targetKeys = Object.keys(data)
    .sort()
    .filter((dateKey) => {
      const date = new Date(dateKey);

      return (
        date.getFullYear() === year &&
        date.getMonth() + 1 === month
      );
    });

  if (targetKeys.length === 0) {
    alert("この月の日記がありません。");
    return;
  }

  let text = `【声日記】${year}年${month}月\n\n`;

  targetKeys.forEach((dateKey) => {
    const date = new Date(dateKey);
    const day = date.getDate();

    text += "────────────\n";
    text += `▼${month}月${day}日\n`;
    text += "────────────\n";

    data[dateKey].forEach((item) => {
      text += `・${item}\n`;
    });

    text += "\n";
  });

  text += "────────────\n";

  const blob = new Blob([text], {
    type: "text/plain;charset=utf-8"
  });

  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = `声日記_${year}-${String(month).padStart(2, "0")}.txt`;
  a.click();

  URL.revokeObjectURL(url);
}

    function formatDateKey(date) {

      const year = date.getFullYear();

      const month =
        String(date.getMonth() + 1).padStart(2, "0");

      const day =
        String(date.getDate()).padStart(2, "0");

      return `${year}-${month}-${day}`;
    }

    function isSameMonth(dateKey, baseDate) {

      const date = new Date(dateKey);

      return (
        date.getFullYear() === baseDate.getFullYear() &&
        date.getMonth() === baseDate.getMonth()
      );
    }

function renderMonthSelect() {
  const data = getDiaryData();

  const months = [...new Set(
    Object.keys(data)
      .sort()
      .map((dateKey) => {
        const date = new Date(dateKey);
        return `${date.getFullYear()}/${date.getMonth() + 1}`;
      })
  )];

  monthSelect.innerHTML = "";

  months.forEach((monthKey) => {
    const option = document.createElement("option");
    option.value = monthKey;
    option.textContent = monthKey;
    monthSelect.appendChild(option);
  });
}

function updateDiaryItem(dateKey, index, newText) {
  const data = getDiaryData();

  if (!data[dateKey]) return;
  if (!newText) return;

  data[dateKey][index] = newText;

  setDiaryData(data);
}

function deleteDiaryItemByIndex(dateKey, index) {
  const data = getDiaryData();

  if (!data[dateKey]) return;

  data[dateKey].splice(index, 1);

  if (data[dateKey].length === 0) {
    delete data[dateKey];
  }

  setDiaryData(data);
}

  </script>

</body>
</html>
